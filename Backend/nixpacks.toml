[phases.setup]
nixPkgs = ['jdk17', 'maven', 'chromium', 'nss', 'nspr', 'atk', 'cups', 'libdrm', 'dbus', 'libxkbcommon', 'xorg.libX11', 'xorg.libXcomposite', 'xorg.libXdamage', 'xorg.libXext', 'xorg.libXfixes', 'xorg.libXrandr', 'xorg.libxcb', 'mesa', 'expat', 'glib', 'pango', 'cairo', 'alsa-lib', 'at-spi2-atk', 'at-spi2-core', 'gtk3', 'nssmdns']

[phases.build]
cmds = [
    'mvn -B -Dmaven.test.skip=true clean package',
    'mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install chromium" || true'
]

[start]
cmd = 'export LD_LIBRARY_PATH=$(find /nix/store -maxdepth 1 -name "*glib-*" | head -1)/lib:$(find /nix/store -maxdepth 1 -name "*atk-*" | head -1)/lib:$(find /nix/store -maxdepth 1 -name "*gtk+3-*" | head -1)/lib:$(find /nix/store -maxdepth 1 -name "*pango-*" | head -1)/lib:$(find /nix/store -maxdepth 1 -name "*cairo-*" | head -1)/lib:$(find /nix/store -maxdepth 1 -name "*nss-*" | head -1)/lib && java -jar target/agentic-price-comparator-1.0-SNAPSHOT.jar'